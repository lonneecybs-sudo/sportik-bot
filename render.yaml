services:
  # Бесплатный Web Service с веб-хуком
  - type: web
    name: sportik-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python render_bot.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false   # Секретная переменная